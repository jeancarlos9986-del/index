<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhar Pedido | F&B Burguer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --brand-red: #E63946;
            --brand-gold: #FFB703;
            --dark-bg: #0B0C10;
            --glass: rgba(31, 40, 51, 0.8);
        }

        body {
            background: radial-gradient(circle at top, #1f2833 0%, #0b0c10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .status-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .status-header h2 {
            color: var(--brand-gold);
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 50px 0;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 25px;
            left: 0;
            height: 4px;
            background: #1a1a1a;
            width: 100%;
            z-index: 1;
            border-radius: 10px;
        }

        .progress-fill {
            position: absolute;
            top: 25px;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--brand-red), var(--brand-gold));
            width: 0%;
            transition: width 1.5s ease;
            z-index: 1;
            border-radius: 10px;
        }

        .step {
            width: 55px;
            height: 55px;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            transition: all 0.5s ease;
        }

        .step.active {
            border-color: var(--brand-red);
            color: white;
            background: var(--dark-bg);
            transform: scale(1.1);
        }

        .step-label { font-size: 0.75rem; margin-top: 12px; color: #666; text-transform: uppercase; }
        .step.active + .step-label { color: white; }
    </style>
</head>

<body>

    <div class="status-card">
        <div class="status-header">
            <h2 id="msg-cliente">Olá!</h2>
            <p id="status-texto">Carregando status...</p>
        </div>

        <div class="progress-container">
            <div class="progress-line"></div>
            <div id="fill" class="progress-fill"></div>

            <div style="display: flex; flex-direction: column; align-items: center; z-index: 2;">
                <div id="step1" class="step"><i class="fas fa-clipboard-check"></i></div>
                <span class="step-label">Recebido</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; z-index: 2;">
                <div id="step2" class="step"><i class="fas fa-fire"></i></div>
                <span class="step-label">Na Chapa</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; z-index: 2;">
                <div id="step3" class="step"><i class="fas fa-motorcycle"></i></div>
                <span class="step-label">Pronto</span>
            </div>
        </div>

        <div id="detalhes-pedido" style="text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
            <p style="color: var(--brand-gold); font-size: 0.9rem;">Resumo do Pedido:</p>
            <ul id="lista-itens" style="list-style: none; padding: 0; margin-top: 10px; font-size: 0.9rem;"></ul>
        </div>

        <button onclick="window.location.href='index.html'" style="margin-top: 25px; width: 100%; padding: 15px; cursor: pointer;">Fazer Novo Pedido</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIcG9NqxQ7PLUB9Qu45FUWwvD1K7of-2s",
            authDomain: "fb-pedidos.firebaseapp.com",
            projectId: "fb-pedidos"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const pedidoId = urlParams.get('id');

        if (pedidoId) {
            onSnapshot(doc(db, "pedidos", pedidoId), (snap) => {
                if (snap.exists()) {
                    const p = snap.data();
                    console.log("Dados do Pedido:", p); // Debug: veja no F12 o que chega do banco

                    document.getElementById('msg-cliente').innerText = `Olá, ${p.cliente_nome}!`;

                    // Lógica de Status
                    const fill = document.getElementById('fill');
                    const s1 = document.getElementById('step1');
                    const s2 = document.getElementById('step2');
                    const s3 = document.getElementById('step3');
                    const txt = document.getElementById('status-texto');

                    // Reset Classes
                    [s1, s2, s3].forEach(el => el.classList.remove('active'));

                    if (p.status === "Pendente") {
                        txt.innerText = "🍔 Pedido recebido na cozinha!";
                        fill.style.width = "0%";
                        s1.classList.add('active');
                    } else if (p.status === "Em preparo" || p.status === "Preparando") {
                        txt.innerText = "🔥 Seu lanche está na chapa!";
                        fill.style.width = "50%";
                        s2.classList.add('active');
                    } else if (p.status === "Pronto") {
                        txt.innerText = "🚀 Pedido finalizado! Saindo.";
                        fill.style.width = "100%";
                        s3.classList.add('active');
                    }

                    // Renderização Segura do Resumo
                    const lista = document.getElementById('lista-itens');
                    lista.innerHTML = "";
                    
                    // Proteção contra undefined usando || {}
                    const lanches = p.lanches || {};
                    const adicionais = p.adicionais || {};
                    const todosItens = { ...lanches, ...adicionais };

                    Object.entries(todosItens).forEach(([nome, qtd]) => {
                        if (qtd > 0) {
                            lista.innerHTML += `<li>✅ ${qtd}x ${nome}</li>`;
                        }
                    });
                } else {
                    document.getElementById('status-texto').innerText = "Pedido não encontrado.";
                }
            });
        } else {
            document.getElementById('status-texto').innerText = "ID de pedido inválido.";
        }
    </script>
</body>
</html>
